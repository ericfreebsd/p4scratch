name: Project Compile Test
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: apt-get install libgdbm-dev
      - name: Compile check (Bytecode)
        run: sh build.sh
